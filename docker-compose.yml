version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on: [mongo, redis]
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=todo_app_db
      - CORS_ORIGINS=http://localhost:3000
      - JWT_SECRET=change-this-super-secret-jwt-key-in-production-2026
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - AES_KEY_B64=Kj8vN4xQpY2rTcWbVeHfUdXgAiSjBoClDoEpFqGrHsI=
      - DEV_MODE=true
    ports:
      - "8001:8001"

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports:
      - "3000:80"

volumes:
  mongo_data:
