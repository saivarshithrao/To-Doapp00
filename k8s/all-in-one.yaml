---
apiVersion: v1
kind: Namespace
metadata: { name: vaultdo }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mongo, namespace: vaultdo }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports: [{ containerPort: 27017 }]
---
apiVersion: v1
kind: Service
metadata: { name: mongo, namespace: vaultdo }
spec:
  selector: { app: mongo }
  ports: [{ port: 27017, targetPort: 27017 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: vaultdo }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: vaultdo }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: v1
kind: Secret
metadata: { name: backend-secrets, namespace: vaultdo }
type: Opaque
stringData:
  JWT_SECRET: change-this-super-secret-jwt-key-in-production-2026
  AES_KEY_B64: Kj8vN4xQpY2rTcWbVeHfUdXgAiSjBoClDoEpFqGrHsI=
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: backend, namespace: vaultdo }
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: vaultdo-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: MONGO_URL, value: "mongodb://mongo:27017" }
            - { name: DB_NAME, value: "todo_app_db" }
            - { name: CORS_ORIGINS, value: "*" }
            - { name: JWT_ALGORITHM, value: "HS256" }
            - { name: ACCESS_TOKEN_EXPIRE_MINUTES, value: "60" }
            - { name: DEV_MODE, value: "false" }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: backend-secrets, key: JWT_SECRET } }
            - name: AES_KEY_B64
              valueFrom: { secretKeyRef: { name: backend-secrets, key: AES_KEY_B64 } }
          ports: [{ containerPort: 8001 }]
---
apiVersion: v1
kind: Service
metadata: { name: backend, namespace: vaultdo }
spec:
  selector: { app: backend }
  ports: [{ port: 8001, targetPort: 8001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: vaultdo }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: vaultdo-frontend:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: vaultdo }
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
